name: CI

on:
  push:
  pull_request:

jobs:
  build-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # AppHost targets net10.0; services target net9.0 — install both SDKs.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore WcPredictions.sln

      - name: Build
        run: dotnet build WcPredictions.sln --no-restore -c Release

      # No test projects yet (added per the §16 testing strategy in later phases).
      # `dotnet test` is a safe no-op until then.
      - name: Test
        run: dotnet test WcPredictions.sln --no-build -c Release --verbosity quiet

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Node 20 LTS in CI (local dev is on 18; Vite 5 supports both).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
