name: CI

on:
  push:
  pull_request:

jobs:
  build-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # AppHost targets net10.0; services target net9.0 — install both SDKs.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore WcPredictions.sln

      - name: Build
        run: dotnet build WcPredictions.sln --no-restore -c Release

      # Integration tests (Ingestion, PredictionEngine, Bff) use Testcontainers;
      # the ubuntu runner ships a working Docker daemon.
      - name: Test
        run: dotnet test WcPredictions.sln --no-build -c Release --verbosity quiet

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Phase 3 smoke: built SPA on `vite preview`, BFF stubbed via page.route.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run e2e
